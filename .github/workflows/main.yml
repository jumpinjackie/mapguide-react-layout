name: CI

on:
  push:
    branches: [ master ]
    tags:
      - 'v*'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies
        run: yarn install

      - name: Audit packages (production packages only)
        run: yarn audit --groups "dependencies"

      - name: Lint and run tests
        run: yarn run ci:gha

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ./coverage-report/lcov.info

      - name: Build size diff
        uses: q1sh101/build-size-diff@v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-install: true
          build-command: 'true'
          dist-path: 'viewer/dist'

  deploy_gh_pages:
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies and build (postinstall produces viewer.zip and storybook.zip)
        run: yarn install

      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          path: gh-pages

      - name: Clear and extract viewer.zip to master/viewer
        run: |
          rm -rf gh-pages/master/viewer
          mkdir -p gh-pages/master/viewer
          unzip viewer.zip -d gh-pages/master/viewer

      - name: Clear and extract storybook.zip to master/storybook-latest
        run: |
          rm -rf gh-pages/master/storybook-latest
          mkdir -p gh-pages/master/storybook-latest
          unzip storybook.zip -d gh-pages/master/storybook-latest

      - name: Commit and push to gh-pages
        run: |
          cd gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --quiet || git commit -m "Deploy master/latest from ${{ github.sha }} (run ${{ github.run_id }})"
          git push

  release:
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'yarn'

      - name: Install dependencies and build
        run: yarn install

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: Release ${{ github.ref_name }} (run ${{ github.run_number }})
          draft: true
          prerelease: true
          files: |
            viewer.zip
            storybook.zip
            apidocs.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
